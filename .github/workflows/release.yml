name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_tag: ${{ steps.release.outputs.tag_name }}
      release_version: ${{ steps.release.outputs.version }}

    steps:
      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Run release
        id: release
        uses: googleapis/release-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-config.json
          manifest-file: .release-manifest.json

  build:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.release_tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build ayni
        run: cargo build -p ayni-cli --release --target ${{ matrix.target }}

      - name: Package binary
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ needs.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          mkdir -p "dist/ayni-${TAG}-${TARGET}"
          cp "target/${TARGET}/release/ayni" "dist/ayni-${TAG}-${TARGET}/"
          cp LICENSE NOTICE "dist/ayni-${TAG}-${TARGET}/"
          ARCHIVE="ayni-${TAG}-${TARGET}.tar.gz"
          tar -C dist -czf "dist/${ARCHIVE}" "ayni-${TAG}-${TARGET}"
          shasum -a 256 "dist/${ARCHIVE}" > "dist/${ARCHIVE}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs:
      - release
      - build
    if: ${{ needs.release.outputs.release_created == 'true' }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Build checksum manifest
        run: |
          set -euo pipefail
          find dist -type f -name "*.sha256" -print0 | sort -z | xargs -0 cat > dist/SHA256SUMS

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.release_tag }}
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS
