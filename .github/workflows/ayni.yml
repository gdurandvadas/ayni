name: ayni

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      install_exit_code: ${{ steps.install.outputs.exit_code }}
      analyze_exit_code: ${{ steps.analyze.outputs.exit_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cargo build ayni-cli
        run: cargo build -p ayni-cli

      - name: Install ayni scaffolding and tools
        id: install
        shell: bash
        run: |
          set +e
          ./target/debug/ayni install --repo-root . --apply
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run ayni analyze
        id: analyze
        shell: bash
        run: |
          set +e
          ./target/debug/ayni analyze --config ./.ayni.toml --output md
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upsert ayni PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          AYNI_BRANCH: ${{ github.head_ref || github.ref_name }}
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const branch = process.env.AYNI_BRANCH || "unknown";
            const marker = `<!-- ayni:md branch=${branch} -->`;
            const summaryPath = ".ayni/last/summary.llm.md";
            const summary = fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, "utf8").trim()
              : "_No markdown summary output found._";

            const body = [
              marker,
              summary
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === "Bot" &&
                typeof comment.body === "string" &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

  status:
    runs-on: ubuntu-latest
    needs: run
    if: always()
    steps:
      - name: Evaluate ayni command status
        shell: bash
        run: |
          install_code="${{ needs.run.outputs.install_exit_code }}"
          analyze_code="${{ needs.run.outputs.analyze_exit_code }}"

          echo "install exit code: ${install_code:-unset}"
          echo "analyze exit code: ${analyze_code:-unset}"

          if [[ -z "$install_code" || -z "$analyze_code" ]]; then
            echo "Missing ayni command exit code output"
            exit 1
          fi

          if [[ "$install_code" != "0" || "$analyze_code" != "0" ]]; then
            echo "Ayni commands failed"
            exit 1
          fi

          echo "Ayni commands succeeded"
