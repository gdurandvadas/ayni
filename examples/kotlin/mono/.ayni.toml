# Repository-agent quality contract for the Kotlin monorepo example.

[checks]
test = true
coverage = true
size = true
complexity = true
deps = true
mutation = false

[languages]
enabled = ["kotlin"]

[concurrency]
amount = 1

[report]
offenders_limit = 8

[kotlin]
roots = ["."]

[kotlin.size]
"**/*.kt" = { warn = 120, fail = 200, exclude = ["build/**", ".gradle/**", ".git/**", ".ayni/**"] }
"**/*.kts" = { warn = 120, fail = 200, exclude = ["build/**", ".gradle/**", ".git/**", ".ayni/**"] }

[kotlin.complexity]
fn_cyclomatic = { warn = 8, fail = 12 }

[kotlin.coverage]
line_percent = { warn = 80, fail = 60 }

[kotlin.deps.forbidden]
"libs/*" = ["services/*"]
